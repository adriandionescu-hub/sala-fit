<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07101f">
  <meta name="description" content="SALA FIT — program de antrenament A/B/C, jurnal local și export CSV.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>SALA FIT · Adrian</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
<header>
  <div class="top">
    <div><div class="brand">SALA FIT · ADRIAN</div><div class="sub">Program A / B / C · maxim 60 minute</div></div>
    <div class="tabs"><button class="tab" data-d="A">A</button><button class="tab" data-d="B">B</button><button class="tab" data-d="C">C</button></div>
  </div>
</header>
<main>
  <div class="update" id="update"><span><b>Versiune nouă disponibilă.</b><br><small>Datele tale rămân salvate.</small></span><button id="applyUpdate">Actualizează</button></div>
  <button class="install" id="install">Instalează SALA FIT pe telefon</button>
  <div class="rule"><b>Regula noastră:</b> DECIZIE → MOTIV → REZULTAT → ÎNVĂȚARE.<br>Greșeala este informație, nu verdict. Restanțele nu prelungesc ședința peste 60 de minute.</div>
  <div class="stats"><div class="stat"><b id="day">B</b><span>ZIUA</span></div><div class="stat"><b id="prog">0/7</b><span>FINALIZATE</span></div><div class="stat"><b id="vol">0</b><span>VOLUM KG</span></div></div>
  <section id="list"></section>
  <div class="version" id="version"></div>
</main>
<footer><div class="actions"><button class="act dark" id="reset">Reset</button><button class="act dark" id="copy">Copiază</button><button class="act ok" id="finish">Închide ședința</button></div></footer>
<div class="toast" id="toast">Salvat</div>
<script src="./app.js" defer></script>
</body>
</html>
